<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Luz is a documentation starter built with Ilha, MDX, Shiki, and Areia. Searchable content, static output, and a polished UI out of the box."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Luz — Documentation starter for Ilha" />
    <meta
      property="og:description"
      content="Launch a polished docs site with MDX pages, command search, syntax highlighting, and static prerendering."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Luz — Documentation starter for Ilha" />
    <meta
      name="twitter:description"
      content="Launch a polished docs site with MDX pages, command search, syntax highlighting, and static prerendering."
    />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="generator" content="Luz" />
    <script>
      (function () {
        var stored = localStorage.getItem("luz:theme");
        var dark =
          stored === "dark" ||
          (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
        document.documentElement.dataset.themeReady = "";
      })();
    </script>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("luzpress:sidebar-layout");
          if (!raw) return;
          var layout = JSON.parse(raw);
          if (!Array.isArray(layout) || layout.length !== 2) return;
          var a = layout[0],
            b = layout[1];
          if (typeof a !== "number" || typeof b !== "number") return;
          var root = document.documentElement;
          root.dataset.luzSidebarLayout = "1";
          root.style.setProperty("--luz-sidebar-pct", String(a));
          root.style.setProperty("--luz-content-pct", String(b));
        } catch (e) {}
      })();
    </script>
    <style id="luz-sidebar-layout-boot">
      html[data-luz-sidebar-layout]
        [data-slot="resizable"]
        > [data-slot="resizable-panel"]:first-child {
        flex-grow: var(--luz-sidebar-pct) !important;
      }
      html[data-luz-sidebar-layout]
        [data-slot="resizable"]
        > [data-slot="resizable-panel"]:last-child {
        flex-grow: var(--luz-content-pct) !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts" prerender></script>
  </body>
</html>
