name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Build imprensa
        run: bun run --filter imprensa build
      - name: Test
        run: bun run --filter imprensa test
      - name: Build starter (integration check)
        run: bun run --filter imprensa-starter build
      - name: Check bundle size budget
        run: node scripts/check-bundle-size.mjs
